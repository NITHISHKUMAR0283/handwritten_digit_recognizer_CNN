<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwritten Digit Recognizer (Pure Frontend)</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f4f6f9;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        canvas {
            border: 2px solid #333;
            background-color: black; /* Match MNIST training domain (dark background, white digits) */
            cursor: crosshair;
            border-radius: 4px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .controls {
            margin-top: 15px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 0 5px;
            transition: background 0.2s;
        }
        .btn-predict { background-color: #007bff; color: white; }
        .btn-predict:hover { background-color: #0056b3; }
        .btn-clear { background-color: #6c757d; color: white; }
        .btn-clear:hover { background-color: #5a6268; }
        #result {
            margin-top: 20px;
            font-size: 24px;
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Draw a Digit (0-9)</h2>
    <canvas id="canvas" width="280" height="280"></canvas>
    
    <div class="controls">
        <button class="btn-clear" onclick="clearCanvas()">Clear</button>
        <button class="btn-predict" onclick="predict()">Predict</button>
    </div>
    
    <div id="result">Prediction: <strong>Waiting...</strong></div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;
    let session = null;

    // 1. Initialize Drawing Environment (White strokes on black background)
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "white";
    ctx.lineWidth = 16; // Bold brush stroke to ensure clarity when downsampling
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    // 2. Load ONNX Model into Browser Memory
    async function initModel() {
        try {
            document.getElementById('result').innerHTML = "Loading neural network...";
            // Explicitly set the WebAssembly binary path relative to the root folder
            ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.14.0/dist/';
            
            // Resolve the path correctly based on the current location
            const modelUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/')) + '/mnist_cnn.onnx';
            
            session = await ort.InferenceSession.create(modelUrl);
            document.getElementById('result').innerHTML = "Prediction: <strong>Ready!</strong>";
        } catch (e) {
            console.error(e);
            document.getElementById('result').innerHTML = "<span style='color:red;'>Model failed to load. Check browser console network indicators.</span>";
        }
    }
    initModel();

    // 3. Canvas Drawing Event Listeners
    canvas.addEventListener('mousedown', (e) => { isDrawing = true; draw(e); });
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', () => { isDrawing = false; ctx.beginPath(); });
    canvas.addEventListener('mouseleave', () => { isDrawing = false; ctx.beginPath(); });

    // Touch support for mobile devices
    canvas.addEventListener('touchstart', (e) => { isDrawing = true; draw(e.touches[0]); e.preventDefault(); });
    canvas.addEventListener('touchmove', (e) => { draw(e.touches[0]); e.preventDefault(); });
    canvas.addEventListener('touchend', () => { isDrawing = false; ctx.beginPath(); });

    function draw(e) {
        if (!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    function clearCanvas() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        document.getElementById('result').innerHTML = "Prediction: <strong>Cleared!</strong>";
    }

    // 4. Preprocessing and Browser Inference
    async function predict() {
        if (!session) {
            alert("Model is still loading or could not be found!");
            return;
        }

        // Create a temporary downsampling canvas to scale 280x280 down to 28x28
        let tempCanvas = document.createElement('canvas');
        tempCanvas.width = 28;
        tempCanvas.height = 28;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(canvas, 0, 0, 28, 28);

        const imgData = tempCtx.getImageData(0, 0, 28, 28);
        const float32Data = new Float32Array(28 * 28);

        // Process data matching the PyTorch domain mapping logic: (pixel - 0.1307) / 0.3081
        for (let i = 0; i < imgData.data.length; i += 4) {
            let r = imgData.data[i];
            let g = imgData.data[i+1];
            let b = imgData.data[i+2];
            
            // Grayscale normalization (0.0 to 1.0 representation)
            let grayscale = (r + g + b) / 3 / 255;
            
            // Apply original global dataset normalization constants from your README
            float32Data[i / 4] = (grayscale - 0.1307) / 0.3081;
        }

        // Construct the structural ONNX input tensor mapping to [Batch=1, Channels=1, Height=28, Width=28]
        const inputTensor = new ort.Tensor('float32', float32Data, [1, 1, 28, 28]);
        
        try {
            // Execute the model forward pass natively inside the browser engine
            const feeds = { input: inputTensor };
            const results = await session.run(feeds);
            const outputData = results.output.data;

            // Find the highest logit output (Argmax classification selection)
            let prediction = outputData.indexOf(Math.max(...outputData));
            document.getElementById('result').innerHTML = `Prediction: <strong style="color:#007bff; font-size:32px;">${prediction}</strong>`;
        } catch (err) {
            console.error(err);
            document.getElementById('result').innerHTML = "<span style='color:red;'>Error executing inference engine.</span>";
        }
    }
</script>

</body>
</html>
